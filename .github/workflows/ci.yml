name: ci

# PR → só "test". Merge na main → "test" e, se passar, "deploy".
# Deploy = build imagens api/worker → push ECR → force-new-deployment no ECS.
# Auth via OIDC (variável de repositório AWS_ROLE_ARN). Não roda Terraform.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER: maria-chat-prod
  ECR_NAMESPACE: maria-chat-prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter ./frontend build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push (api)
        env: { REG: "${{ steps.ecr.outputs.registry }}" }
        run: |
          IMG="$REG/${{ env.ECR_NAMESPACE }}/api"
          docker build -f Dockerfile.api -t "$IMG:$GITHUB_SHA" -t "$IMG:latest" .
          docker push "$IMG:$GITHUB_SHA"
          docker push "$IMG:latest"

      - name: Build e push (worker)
        env: { REG: "${{ steps.ecr.outputs.registry }}" }
        run: |
          IMG="$REG/${{ env.ECR_NAMESPACE }}/worker"
          docker build -f Dockerfile.worker -t "$IMG:$GITHUB_SHA" -t "$IMG:latest" .
          docker push "$IMG:$GITHUB_SHA"
          docker push "$IMG:latest"

      - name: Deploy ECS (força novo deployment — puxa :latest)
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service api    --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER" --service worker --force-new-deployment
