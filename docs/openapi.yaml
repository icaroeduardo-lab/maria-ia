  # ── Admin: Config/Users/Analytics/Audit ────────────────────
  /admin/config:
    get:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Lê config global (estilo + conversacional)
      responses:
        "200":
          description: Config atual + texto padrão do estilo
          content: { application/json: { schema: { $ref: '#/components/schemas/ConfigIA' } } }
    put:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Atualiza config global (admin) — invalida o cache de reescrita
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                estiloPrompt: { type: string }
                conversacional: { type: boolean }
                horarioAtivo: { type: boolean }
                diasSemana:
                  type: array
                  items: { type: integer, minimum: 0, maximum: 6 }
                horaInicio: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
                horaFim: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
      responses:
        "200":
          description: Config persistida
          content: { application/json: { schema: { $ref: '#/components/schemas/ConfigIA' } } }
        "400":
          description: horaInicio/horaFim malformado, janela invertida (horaFim <= horaInicio) ou diasSemana inválido — nada é persistido
          content: { application/json: { schema: { $ref: '#/components/schemas/Erro' } } }
  /admin/users:
    get:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Lista usuários
      responses: { "200": { description: OK } }
    post:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Cria usuário (admin)
      responses: { "200": { description: OK } }
  /admin/analytics/summary:
    get:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Métricas agregadas
      responses:
        "200":
          description: Resumo analítico (30 dias na série diária)
          content: { application/json: { schema: { $ref: '#/components/schemas/AnalyticsSummary' } } }
  /admin/analytics/funil/{flowId}:
    get:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Passagens acumuladas por nó de um fluxo (funil/drop-off)
      parameters: [{ in: path, name: flowId, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Contagem por nó (front calcula % de abandono usando os edges do fluxo)
          content: { application/json: { schema: { $ref: '#/components/schemas/FunilPorNo' } } }
        "404": { description: Fluxo não encontrado }
  /admin/audit:
    get:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Log de auditoria (admin) — quem revelou PII
      parameters: [{ in: query, name: page, schema: { type: integer } }]
      responses:
        "200":
          description: Página da trilha de auditoria
          content: { application/json: { schema: { $ref: '#/components/schemas/AuditPage' } } }
  /admin/test-chat:
    post:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Chat de teste no painel (retorna resumo + metadados)
      description: >
        Roda o grafo direto num checkpoint LangGraph de teste
        (thread_id: test:<flowId>:<sessionId>), sem criar Conversation.
        Resposta inclui tipoPerguntaPendente (cpf/telefone/cep/data/documento/
        sim_nao/opcoes/texto/null), resolvido contra o flow informado (ou o
        registro estático se flowId for omitido) — o painel usa esse campo pra
        decidir o widget de resposta (ex: upload em vez de texto livre).
        Também inclui trilha: lista ordenada dos ids de node do flow visitados
        na sessão (do primeiro até o nó atual/pausado) — atravessa subfluxos
        embutidos naturalmente (ids prefixados sf_<node>_<idOriginal>). Vazio
        quando flowId é omitido (grafo estático, sem canvas) ou após reiniciar
        a sessão (novo sessionId ou #sair). Alimenta o destaque da trajetória
        no canvas do builder visual.
      responses:
        "200": { description: "{ messages, done, dadosColetados, tipoPerguntaPendente, trilha, resumo?, metadados? }" }
        "404": { description: Fluxo não encontrado }
        "422": { description: Flow inválido (falha ao compilar) }
  /admin/test-chat/upload:
    post:
      tags: [Admin — Config/Users/Analytics/Audit]
      summary: Upload de documento no chat de teste (issue #82) — equivalente admin de /api/upload-documento
      description: >
        Sem Conversation (chat de teste não cria uma) — auth é JWT admin
        (exigirAdmin), sem rate limit. Magic bytes decidem o mimetype real;
        avança o mesmo thread do chat de teste (test:<flowId>:<sessionId>) e
        devolve o mesmo shape de /admin/test-chat (incluindo trilha).
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sessionId, file]
              properties:
                sessionId: { type: string, description: "sessionId da sessão de teste" }
                flowId: { type: string, description: "flow de teste (opcional — omitido usa o grafo estático)" }
                file: { type: string, format: binary, description: "jpeg/png/PDF, máx 10MB" }
      responses:
        "200": { description: "{ messages, done, dadosColetados, tipoPerguntaPendente, trilha }" }
        "400": { description: sessionId ou arquivo ausente }
        "404": { description: Fluxo não encontrado }
        "413": { description: Arquivo grande demais }
        "415": { description: "Tipo de arquivo não aceito (magic bytes)" }
        "422": { description: Flow inválido (falha ao compilar) }

