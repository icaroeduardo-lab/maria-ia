AWSTemplateFormatVersion: "2010-09-09"
Description: Maria Chat - RDS Postgres PROVISÓRIO para testes (apagar a stack remove tudo)

Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    Description: Senha do usuário master do Postgres
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets (>=2 AZs) para o subnet group do RDS

Resources:
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Maria RDS teste - acesso Postgres
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0   # provisório/teste — senha protege; derrubar a stack depois
      Tags:
        - { Key: projeto, Value: maria-chat }

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Maria RDS subnets
      SubnetIds: !Ref SubnetIds

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: maria-test
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: "20"
      MasterUsername: mariachat
      MasterUserPassword: !Ref DBPassword
      DBName: mariachat
      PubliclyAccessible: true
      VPCSecurityGroups: [!Ref DBSecurityGroup]
      DBSubnetGroupName: !Ref DBSubnetGroup
      BackupRetentionPeriod: 0
      MultiAZ: false
      Tags:
        - { Key: projeto, Value: maria-chat }

Outputs:
  Endpoint:
    Value: !GetAtt Database.Endpoint.Address
  Porta:
    Value: !GetAtt Database.Endpoint.Port
