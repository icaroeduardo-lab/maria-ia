      parameters: [{ in: path, name: sessionId, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK }
        "404": { description: Não encontrada }
        "409": { description: "Conversa não está aguardando atendente" }
  /admin/handoff/{sessionId}/liberar:
    post:
