services:

  # ── Banco de dados ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mariachat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mariachat
      POSTGRES_USER: mariachat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mariachat_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mariachat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mariachat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (LangGraph engine + API) ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mariachat-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mariachat:${POSTGRES_PASSWORD:-mariachat_dev}@postgres:5432/mariachat
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data  # SQLite fallback (dev) e uploads

  # ── Frontend admin (Vite React) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: mariachat-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mariachat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - prod  # só sobe em produção: docker compose --profile prod up

volumes:
  postgres_data:
  redis_data:
