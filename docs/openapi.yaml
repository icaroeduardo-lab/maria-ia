openapi: 3.0.3
info:
  title: Maria Chat API
  version: "1.0.0"
  description: >
    API do backend do Maria Chat (atendimento jurídico da DPERJ).
    Grupos: webhook do WhatsApp, chat público, autenticação, painel admin
    (prefixo /admin, JWT), rotas internas do fluxo (/api/*, chamadas pelo engine)
    e mocks de teste (/mock/*). Rotas do painel exigem Bearer JWT; mutações
    exigem papel admin.
servers:
  - url: http://maria-chat-prod-alb-554264540.us-east-1.elb.amazonaws.com
    description: Produção (AWS ALB)
  - url: http://localhost:3000
    description: Local

tags:
  - name: Webhook
  - name: Chat
  - name: Auth
  - name: Admin — Flows
  - name: Admin — Conversations
  - name: Admin — Assistidos
  - name: Admin — Config/Users/Analytics/Audit
  - name: Interno (fluxo)
  - name: Mock
  - name: Infra

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Erro:
      type: object
      properties:
        erro: { type: string }
    LoginReq:
      type: object
      required: [email, senha]
      properties:
        email: { type: string, format: email }
        senha: { type: string }
    LoginResp:
      type: object
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        nome: { type: string }
        role: { type: string, enum: [admin, viewer] }
    ChatReq:
      type: object
      required: [sessionId]
      properties:
        sessionId: { type: string }
        message: { type: string }
    ChatResp:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              role: { type: string }
              content: {}
        lgpdAceito: { type: boolean }
    FlowNode:
      type: object
      required: [id, type, position, data]
      properties:
        id: { type: string, description: "Estável — mudar reseta o cache de reescrita" }
        type:
          type: string
          enum: [mensagem, pergunta, condicao, classificar, ia, api, subgrafo, subfluxo, atribuir, encerrar]
        position:
          type: object
          required: [x, y]
          properties:
            x: { type: number }
            y: { type: number }
        data:
          type: object
          additionalProperties: true
          description: "Campos por tipo de nó — ver docs/guia-frontend.md §2.2"
    FlowEdge:
      type: object
      required: [id, source, target]
      properties:
        id: { type: string }
        source: { type: string }
        target: { type: string }
        label: { type: string, description: "Valor esperado em condicao/classificar; '*' = default" }
    Flow:
      type: object
      required: [id, name, nodes, edges, active]
      properties:
        id: { type: string }
        name: { type: string }
        nodes: { type: array, items: { $ref: '#/components/schemas/FlowNode' } }
        edges: { type: array, items: { $ref: '#/components/schemas/FlowEdge' } }
        active: { type: boolean }
        isTemplate: { type: boolean, description: "catálogo de templates — card #20260127" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    FlowVersionResumo:
      type: object
      required: [versao, name, criadoEm]
      properties:
        versao: { type: integer }
        name: { type: string }
        autor: { type: string, nullable: true, description: "email de quem salvou" }
        criadoEm: { type: string, format: date-time }
    FlowVersionCompleta:
      allOf:
        - $ref: '#/components/schemas/FlowVersionResumo'
        - type: object
          required: [id, flowId, nodes, edges]
          properties:
            id: { type: string }
            flowId: { type: string }
            nodes: { type: array, items: { $ref: '#/components/schemas/FlowNode' } }
            edges: { type: array, items: { $ref: '#/components/schemas/FlowEdge' } }
    ProcessosConsultaReq:
      type: object
      required: [cpf]
      properties:
        cpf: { type: string, description: "CPF só dígitos" }
    ProcessosConsultaResp:
      type: object
      properties:
        tem_processo: { type: boolean }
        processos:
          type: array
          items:
            type: object
            properties:
              numero: { type: string }
              assunto: { type: string }
              ativo: { type: boolean }
        lista: { type: string }
    ResumoReq:
      type: object
      properties:
        processo_sel: { type: string, description: "número completo ou índice (1,2,...)" }
        numero: { type: string }
        processos: { type: string, description: "JSON da consulta anterior (para mapear índice)" }
    ResumoResp:
      type: object
      properties:
        resumo: { type: string }
        numero: { type: string }
    CasosConsultaResp:
      type: object
      properties:
        tem_casos: { type: boolean }
        casos:
          type: array
          description: "campos preservam os nomes originais do Verde (issue maria-ia#110)"
          items:
            type: object
            properties:
              id: { type: integer }
              status: { type: string }
              tipoCaso: { type: string }
              assunto:
                type: object
                nullable: true
                properties:
                  id: { type: integer }
                  nome: { type: string }
              numeroProcesso: { type: string, nullable: true }
              dataAtualizacao: { type: string, nullable: true }
              orgaosAssociados:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    nome: { type: string }
                    responsavel: { type: boolean }
              andamentos:
                type: array
                items:
                  type: object
                  properties:
                    titulo: { type: string }
                    descricao: { type: string }
                    data: { type: string }
        lista: { type: string }
    PessoaPresaConsultaResp:
      type: object
      required: [encontrado, situacao, nome, tipoPreso, regime, idPessoa, idSeap]
      properties:
        encontrado: { type: boolean }
        situacao: { type: string, description: "ATIVO | LIBERTADO | FORAGIDO | EGRESSO | EVADIDO | ... (\"nao_encontrado\" se não achou)" }
        nome: { type: string }
        tipoPreso: { type: string, description: "CONDENADO | SENTENCIADO | PROVISORIO | ..." }
        regime: { type: string }
        idPessoa: { type: string, description: "usado em GET /api/pessoa-presa/casos?idPessoaPresa=" }
        idSeap: { type: string, description: "usado em GET /api/pessoa-presa/orgao-responsavel(-liberto)?idSeap=" }
    PessoaPresaProcessoResp:
      type: object
      required: [encontrado, numero, origem, idProcesso]
      properties:
        encontrado: { type: boolean }
        numero: { type: string }
        origem: { type: string, description: "ex: SEEU" }
        idProcesso: { type: string }
    PessoaPresaCasosResp:
      type: object
      required: [tem_casos, status, casos, lista]
      properties:
        tem_casos: { type: boolean }
        status: { type: string, description: "\"ABERTO\" (literal, comparado pelo nó condicao) ou \"\" se não há caso aberto" }
        casos:
          type: array
          items:
            type: object
            properties:
              identificador: { type: string }
              tipo: { type: string }
        lista: { type: string }
    PessoaPresaOrgaoResp:
      type: object
      required: [status, orgao]
      properties:
        status: { type: string, description: "\"encontrado\" (literal, comparado pelo nó condicao) ou \"nao_encontrado\"" }
        orgao:
          type: object
          nullable: true
          properties:
            nome: { type: string }
            telefone: { type: string }
            endereco: { type: string }
    PlantaoOrgaoResp:
      type: object
      required: [status, orgao]
      properties:
        status: { type: string, description: "\"encontrado\" (literal, comparado pelo nó condicao) ou \"nao_encontrado\"" }
        orgao:
          type: object
          nullable: true
          properties:
            nome: { type: string }
            telefone: { type: string, nullable: true }
            endereco: { type: string, nullable: true }
            municipio: { type: string }
            tipo: { type: string, description: "REGIONAL | CAPITAL — nunca MUNICIPAL (a rota já filtra)" }
    RecessoResp:
      type: object
      required: [status]
      properties:
        status: { type: string, description: "\"SEM_RECESSO_VIGENTE\" ou \"RECESSO_VIGENTE\" (literais, comparados pelo nó condicao)" }
        mensagem: { type: string, nullable: true, description: "mensagem pro assistido quando em recesso" }
    CpfReq:
      type: object
      required: [cpf]
      properties:
        cpf: { type: string }
    CasoDetalheReq:
      type: object
      properties:
        caso_sel: { type: string, description: "id completo ou índice (1,2,...)" }
        casos: { type: string, description: "JSON da consulta anterior (para mapear índice, resolve sem re-fetch)" }
    CasoDetalheResp:
      type: object
      required: [encontrado]
      properties:
        encontrado: { type: boolean }
        id: { type: integer }
        status: { type: string }
        tipoCaso: { type: string }
        assunto:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            nome: { type: string }
        orgaosAssociados:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              nome: { type: string }
              responsavel: { type: boolean }
        andamentos:
          type: array
          description: "só o mais recente (índice 0), não o histórico completo"
          items:
            type: object
            properties:
              titulo: { type: string }
              descricao: { type: string }
              data: { type: string }
        numeroProcesso: { type: string, nullable: true }
        processo:
          type: object
          nullable: true
          description: "junta GET /api/processo/{numero} quando há numeroProcesso — mesmo formato dessa rota, sem remapear"
        temProcesso: { type: string, description: "\"true\"/\"false\" — flag auxiliar pro fluxo rotear (condicao só faz match exato)" }
    AgendamentosConsultaResp:
      type: object
      properties:
        tem_agendamentos: { type: boolean }
        agendamentos:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              tipo: { type: string }
              data: { type: string, format: date-time }
              local: { type: string, nullable: true }
        lista: { type: string, description: "texto formatado, 1 linha por agendamento" }
    AgendamentoDetalheReq:
      type: object
      properties:
        agendamento_sel: { type: string, description: "id completo ou índice (1,2,...)" }
        agendamentos: { type: string, description: "JSON da consulta anterior (para mapear índice)" }
    AgendamentoDetalheResp:
      type: object
      required: [encontrado]
      properties:
        encontrado: { type: boolean }
        id: { type: string }
        tipo: { type: string }
        data: { type: string, format: date-time }
        local: { type: string, nullable: true }
        status: { type: string }
        assistido: { type: string }
    AgendamentoDetalheRicoReq:
      type: object
      required: [idEvento]
      properties:
        idEvento: { type: string }
    AgendamentoDetalheRicoResp:
      type: object
      required: [encontrado]
      description: "campos preservam os nomes originais do Verde (issue maria-ia#111, gateway#21)"
      properties:
        encontrado: { type: boolean }
        idEvento: { type: integer }
        idAssistido: { type: integer }
        idOrgao: { type: integer }
        idCaso: { type: integer, nullable: true }
        nomeAssistido: { type: string }
        nomeOrgao: { type: string }
        endereco: { type: string }
        data: { type: string }
        horario: { type: string }
        documentosNecessarios: { type: string, nullable: true }
        nomeAssunto: { type: string, nullable: true }
    AgendamentoVagasReq:
      type: object
      required: [idEvento]
      properties:
        idEvento: { type: string }
    AgendamentoVagasResp:
      type: object
      properties:
        tem_vagas: { type: boolean }
        vagas:
          type: array
          items:
            type: object
            properties:
              idIntervalo: { type: integer }
              data: { type: string }
              hora: { type: string }
        lista: { type: string, description: "texto formatado, 1 linha por vaga" }
    AgendamentoVagaDetalheReq:
      type: object
      properties:
        vaga_sel: { type: string, description: "índice (1,2,...) da lista de vagas anterior" }
        vagas: { type: string, description: "JSON da consulta de vagas anterior (resolve sem re-fetch)" }
    AgendamentoVagaDetalheResp:
      type: object
      required: [encontrada]
      properties:
        encontrada: { type: boolean }
        idIntervalo: { type: integer }
        data: { type: string }
        hora: { type: string }
    AgendamentoReagendarReq:
      type: object
      required: [idAgendamento, configuracaoIntervaloAgenda, dataNova]
      properties:
        idAgendamento: { type: string }
        configuracaoIntervaloAgenda: { type: string, description: "idIntervalo da vaga escolhida" }
        dataNova: { type: string }
        horaNova: { type: string, description: "combinada com dataNova antes de enviar ao Verde (\"DD/MM/YYYY HH:mm\")" }
    AgendamentoReagendarResp:
      type: object
      required: [sucesso]
      properties:
        sucesso: { type: boolean }
    AgendamentoDesmarcarReq:
      type: object
      required: [idAgendamento, idPessoa]
      properties:
        idAgendamento: { type: string }
        idPessoa: { type: string }
    AgendamentoDesmarcarResp:
      type: object
      required: [sucesso]
      properties:
        sucesso: { type: boolean }
        emailEnviado: { type: boolean, description: "204 do Verde (true) vs 200 sucesso parcial (false, e-mail falhou)" }
    ConfigIA:
      type: object
      description: Configuração global da IA (singleton id=default)
      required: [estiloPrompt, conversacional]
      properties:
        estiloPrompt:
          type: string
          description: Preâmbulo de estilo aplicado a TODA fala da IA (vazio = usa o padrão)
        conversacional:
          type: boolean
          description: Liga/desliga a reescrita acolhedora das perguntas
        padrao:
          type: string
          description: Texto padrão do estilo (só no GET — alimenta o "restaurar padrão")
        horarioAtivo:
          type: boolean
          description: Liga/desliga o aviso automático de fora do expediente (issue #79)
        diasSemana:
          type: array
          description: Dias de expediente — 0=domingo...6=sábado
          items: { type: integer, minimum: 0, maximum: 6 }
        horaInicio:
          type: string
          description: Início do expediente, formato HH:mm (America/Sao_Paulo)
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        horaFim:
          type: string
          description: Fim do expediente (exclusive), formato HH:mm — precisa ser maior que horaInicio (sem overnight)
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        id: { type: string }
        updatedAt: { type: string, format: date-time }
    ConversaResumo:
      type: object
      description: Item da listagem — select enxuto, SEM PII (LGPD)
      required: [id, sessionId, channel, status, startedAt, updatedAt]
      properties:
        id: { type: string }
        sessionId: { type: string }
        channel: { type: string, description: "whatsapp | web" }
        flowId: { type: string, nullable: true }
        status: { type: string, description: "active | completed | abandoned" }
        categoria: { type: string, nullable: true }
        ultimaEtapa: { type: string, nullable: true }
        protocoloDperj: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
    ConversasPage:
      type: object
      required: [total, page, itens]
      properties:
        total: { type: integer }
        page: { type: integer }
        itens: { type: array, items: { $ref: '#/components/schemas/ConversaResumo' } }
    ConversaDetalhe:
      allOf:
        - $ref: '#/components/schemas/ConversaResumo'
        - type: object
          properties:
            dadosColetados: { type: object, additionalProperties: true }
            resumo: { type: string, nullable: true }
            metadados:
              type: object
              nullable: true
              additionalProperties: true
              description: "assistido dentro de metadados vem MASCARADO (LGPD); completo só via /revelar"
    HandoffItem:
      type: object
      required: [id, sessionId, channel, handoffStatus]
      properties:
        id: { type: string }
        sessionId: { type: string }
        channel: { type: string }
        categoria: { type: string, nullable: true }
        handoffStatus: { type: string, enum: [aguardando, em_atendimento] }
        handoffOperador: { type: string, nullable: true }
        handoffDesde: { type: string, format: date-time, nullable: true }
    HandoffPage:
      type: object
      required: [itens]
      properties:
        itens: { type: array, items: { $ref: '#/components/schemas/HandoffItem' } }
    MensagemHistorico:
      type: object
      required: [role, content]
      properties:
        role: { type: string, description: "human | ai" }
        content:
          description: "string ou array de content blocks (text, image_url, boolean, options, cta_url)"
    HistoricoResp:
      type: object
      required: [messages]
      properties:
        messages: { type: array, items: { $ref: '#/components/schemas/MensagemHistorico' } }
    Assistido:
      type: object
      description: "Nas listagens os campos de PII vêm MASCARADOS; completos só no detalhe (auditado) e no /revelar"
      required: [id, cpf, nome, situacao]
      properties:
        id: { type: string }
        cpf: { type: string }
        nome: { type: string }
        dataNascimento: { type: string, nullable: true }
        nomeMae: { type: string, nullable: true }
        situacao: { type: string }
        municipio: { type: string, nullable: true }
        uf: { type: string, nullable: true }
        telefone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        cep: { type: string, nullable: true }
        bairro: { type: string, nullable: true }
        logradouro: { type: string, nullable: true }
        numero: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AssistidosPage:
      type: object
      required: [total, page, itens]
      properties:
        total: { type: integer }
        page: { type: integer }
        itens: { type: array, items: { $ref: '#/components/schemas/Assistido' } }
    AnalyticsSummary:
      type: object
      required: [total, taxaConclusao, porStatus, porCategoria, porCanal, abandonoPorEtapa, serieDiaria, mediaCsat, csatPorCategoria, csatPorFluxo]
      properties:
        total: { type: integer }
        taxaConclusao: { type: number, description: "0..1" }
        porStatus:
          type: array
          items: { type: object, required: [status, total], properties: { status: { type: string }, total: { type: integer } } }
        porCategoria:
          type: array
          items: { type: object, required: [categoria, total], properties: { categoria: { type: string }, total: { type: integer } } }
        porCanal:
          type: array
          items: { type: object, required: [canal, total], properties: { canal: { type: string }, total: { type: integer } } }
        abandonoPorEtapa:
          type: array
          items: { type: object, required: [etapa, total], properties: { etapa: { type: string }, total: { type: integer } } }
        serieDiaria:
          type: array
          description: "últimos 30 dias"
          items: { type: object, required: [dia, total, concluidas], properties: { dia: { type: string }, total: { type: integer }, concluidas: { type: integer } } }
        mediaCsat:
          type: number
          nullable: true
          description: "média geral da nota de satisfação (1-5); null se nenhuma conversa tem nota ainda"
        csatPorCategoria:
          type: array
          items: { type: object, required: [categoria, media], properties: { categoria: { type: string }, media: { type: number } } }
        csatPorFluxo:
          type: array
          items: { type: object, required: [flowId, media], properties: { flowId: { type: string }, media: { type: number } } }
    FunilPorNo:
      type: object
      required: [nodes]
      properties:
        nodes:
          type: array
          items: { type: object, required: [nodeId, total], properties: { nodeId: { type: string }, total: { type: integer } } }
    AuditLogItem:
      type: object
      required: [id, userId, userEmail, acao, alvoTipo, alvoId, criadoEm]
      properties:
        id: { type: string }
        userId: { type: string }
        userEmail: { type: string }
        acao: { type: string, description: "revelar" }
        alvoTipo: { type: string, description: "assistido | conversa" }
        alvoId: { type: string }
        criadoEm: { type: string, format: date-time }
    AuditPage:
      type: object
      required: [total, page, itens]
      properties:
        total: { type: integer }
        page: { type: integer }
        itens: { type: array, items: { $ref: '#/components/schemas/AuditLogItem' } }

security:
  - bearerAuth: []

paths:
  # ── Webhook ────────────────────────────────────────────────
  /webhook/whatsapp:
    get:
      tags: [Webhook]
      summary: Verificação do webhook (challenge da Meta)
      security: []
      parameters:
        - { in: query, name: "hub.mode", schema: { type: string } }
        - { in: query, name: "hub.verify_token", schema: { type: string } }
        - { in: query, name: "hub.challenge", schema: { type: string } }
      responses:
        "200": { description: Retorna o challenge }
        "403": { description: Token inválido }
    post:
      tags: [Webhook]
      summary: Recebe mensagens do WhatsApp (responde 200 imediato, processa async)
      security: []
      responses:
        "200": { description: Aceito }

  # ── Chat público ───────────────────────────────────────────
  /api/chat:
    post:
      tags: [Chat]
      summary: Envia mensagem (canal web)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatReq' }
      responses:
        "200":
          description: Respostas da Maria
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatResp' }

  # ── Auth ───────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login (JWT 8h)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginReq' }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResp' }
        "401": { description: Credenciais inválidas }
  /auth/me:
    get:
      tags: [Auth]
      summary: Dados do usuário autenticado
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  # ── Admin: Upload ──────────────────────────────────────────
  /admin/upload:
    post:
      tags: [Admin — Flows]
      summary: Upload de imagem p/ os fluxos (admin) — re-encoda (remove EXIF) e grava no S3
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary, description: "jpeg/png/webp, máx 5MB" }
      responses:
        "200": { description: "{ url } — URL pública permanente (S3)" }
        "413": { description: Arquivo grande demais }
        "415": { description: Formato não suportado }

  # ── Admin: Flows ───────────────────────────────────────────
  /admin/flows:
    get:
      tags: [Admin — Flows]
      summary: Lista fluxos
      responses:
        "200":
          description: Lista (sem nodes/edges — resumo)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, name, active]
                  properties:
                    id: { type: string }
                    name: { type: string }
                    active: { type: boolean }
                    isTemplate: { type: boolean }
                    createdAt: { type: string, format: date-time }
                    updatedAt: { type: string, format: date-time }
    post:
      tags: [Admin — Flows]
      summary: Cria fluxo (admin)
      responses:
        "200":
          description: Criado
          content: { application/json: { schema: { $ref: '#/components/schemas/Flow' } } }
  /admin/flows/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get:
      tags: [Admin — Flows]
      summary: Detalha fluxo
      responses: { "200": { content: { application/json: { schema: { $ref: '#/components/schemas/Flow' } } } }, "404": { description: Não encontrado } }
    put:
      tags: [Admin — Flows]
      summary: Atualiza fluxo (admin) — lock otimista opcional
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                nodes: { type: array, items: { $ref: '#/components/schemas/FlowNode' } }
                edges: { type: array, items: { $ref: '#/components/schemas/FlowEdge' } }
                updatedAt:
                  type: string
                  format: date-time
                  description: >
                    Lock otimista (opcional): updatedAt carregado pelo cliente.
                    Se o fluxo mudou desde então, a API responde 409 — recarregue
                    antes de salvar. Omitido = save incondicional.
      responses:
        "200":
          description: Fluxo atualizado
          content: { application/json: { schema: { $ref: '#/components/schemas/Flow' } } }
        "404": { description: Não encontrado }
        "409":
          description: "Conflito: fluxo alterado por outro editor"
          content:
            application/json:
              schema:
                type: object
                required: [erro, updatedAt]
                properties:
                  erro: { type: string }
                  updatedAt: { type: string, format: date-time }
    delete:
      tags: [Admin — Flows]
      summary: Remove fluxo (admin)
      responses: { "200": { description: OK } }
  /admin/flows/{id}/versoes:
    get:
      tags: [Admin — Flows]
      summary: Histórico de versões do fluxo (snapshot a cada save)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Versões, mais recente primeiro
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FlowVersionResumo' }
        "404": { description: Não encontrado }
  /admin/flows/{id}/versoes/{versao}:
    get:
      tags: [Admin — Flows]
      summary: Detalhe de uma versão (com nodes/edges, p/ preview)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { in: path, name: versao, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Versão completa
          content: { application/json: { schema: { $ref: '#/components/schemas/FlowVersionCompleta' } } }
        "404": { description: Não encontrada }
  /admin/flows/{id}/versoes/{versao}/restaurar:
    post:
      tags: [Admin — Flows]
      summary: Restaura uma versão (admin) — estado atual vira nova versão antes (reversível)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { in: path, name: versao, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Fluxo restaurado
          content: { application/json: { schema: { $ref: '#/components/schemas/Flow' } } }
        "404": { description: Não encontrada }
  /admin/flows/{id}/validar:
    get:
      tags: [Admin — Flows]
      summary: Valida fluxo (estrutura + compilação)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses: { "200": { description: "{ ok, erros[] }" } }
  /admin/flows/{id}/activate:
    post:
      tags: [Admin — Flows]
      summary: Ativa fluxo (desativa os demais) (admin)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
  /admin/flows/{id}/deactivate:
    post:
      tags: [Admin — Flows]
      summary: Desativa fluxo (admin)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
  /admin/flows/{id}/marcar-template:
    post:
      tags: [Admin — Flows]
      summary: Marca fluxo como template do catálogo (admin) — metadado, não versiona
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Flow' } } } }
        "404": { description: Não encontrado }
  /admin/flows/{id}/desmarcar-template:
    post:
      tags: [Admin — Flows]
      summary: Desmarca fluxo como template do catálogo (admin)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Flow' } } } }
        "404": { description: Não encontrado }

