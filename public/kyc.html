<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Confirmação de identidade — Defensoria Pública RJ</title>
<style>
  :root { --verde: #14532d; --verde2: #3f7a5a; --bg: #0e1512; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: #eaf2ee; min-height: 100dvh; display: flex;
         flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .card { width: 100%; max-width: 420px; background: #14201b; border-radius: 20px;
          padding: 22px; box-shadow: 0 12px 40px rgba(0,0,0,.4); text-align: center; }
  h1 { font-size: 19px; margin: 4px 0 2px; color: #fff; }
  .sub { font-size: 13px; color: #9fb8ab; margin-bottom: 10px; }
  .intro { font-size: 13px; color: #c2d6cc; margin: 0 4px 16px; line-height: 1.5; }
  .palco { position: relative; width: 260px; height: 260px; margin: 0 auto 16px;
           border-radius: 50%; overflow: hidden; background: #0a0f0d;
           border: 3px solid var(--verde2); }
  video, canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  canvas { display: none; }
  .anel { position: absolute; inset: -3px; border-radius: 50%; pointer-events: none;
          border: 3px solid transparent; }
  .anel.scan { border-top-color: #36d399; animation: girar 1s linear infinite; }
  @keyframes girar { to { transform: rotate(360deg); } }
  button { width: 100%; padding: 15px; font-size: 16px; font-weight: 600; border: 0;
           border-radius: 12px; background: var(--verde); color: #fff; cursor: pointer; }
  button:disabled { opacity: .5; }
  .status { font-size: 14px; margin-top: 14px; min-height: 20px; }
  .ok { color: #36d399; font-weight: 600; }
  .erro { color: #f87272; }
  .check { font-size: 56px; line-height: 1; margin: 8px 0; }
  .dica { font-size: 12px; color: #7d978b; margin-top: 10px; }
  .lgpd { font-size: 11px; color: #6b8276; margin-top: 16px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="card">
    <h1>Confirme que é você</h1>
    <div class="sub">Defensoria Pública do Rio de Janeiro</div>
    <div class="intro" id="intro">É rapidinho e seguro: tiramos uma selfie só para
    garantir que é você mesmo. 💚</div>

    <div class="palco">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="320" height="320"></canvas>
      <div class="anel" id="anel"></div>
    </div>

    <button id="btn">Permitir câmera</button>
    <div class="status" id="status"></div>
    <div class="dica" id="dica">Fique num lugar com luz e deixe seu rosto dentro do círculo.</div>

    <div class="lgpd">🔒 Sua foto é usada só para confirmar sua identidade neste
    atendimento e <b>não fica guardada</b>.</div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const token = params.get("t") || "";
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const anel = document.getElementById("anel");
  const dica = document.getElementById("dica");
  let stream = null, etapa = "inicio";

  function setStatus(t, cls) { status.textContent = t; status.className = "status " + (cls || ""); }

  async function abrirCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: 320, height: 320 }, audio: false,
      });
      video.srcObject = stream;
      etapa = "pronto";
      btn.textContent = "Tirar selfie";
      setStatus("Câmera pronta! Quando estiver bem na foto, toque em Tirar selfie.", "");
    } catch (e) {
      setStatus("Não consegui abrir a câmera. Toque em Permitir quando o navegador pedir, e tente de novo.", "erro");
    }
  }

  async function capturar() {
    if (!token) { setStatus("Link inválido. Volte ao WhatsApp e tente de novo.", "erro"); return; }
    btn.disabled = true;
    anel.className = "anel scan";
    dica.style.display = "none";
    document.getElementById("intro").style.display = "none";
    setStatus("Só um instante, estou te reconhecendo…", "");

    // captura o frame atual (fica no dispositivo; enviamos só a confirmação)
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    await new Promise(r => setTimeout(r, 2200)); // simula o reconhecimento facial

    try {
      const res = await fetch("/api/kyc/captura", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const j = await res.json().catch(() => ({}));
      anel.className = "anel";
      if (res.ok && j.ok) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        video.style.display = "none";
        canvas.parentElement.innerHTML = '<div class="check">✅</div>';
        setStatus("Tudo certo! Você foi reconhecido(a).", "ok");
        btn.textContent = "Voltar ao WhatsApp";
        btn.disabled = false;
        btn.onclick = () => { location.href = "https://wa.me/"; };
        dica.style.display = "block";
        dica.textContent = "Agora é só voltar à conversa e responder PRONTO. 💚";
      } else {
        setStatus("Não consegui confirmar dessa vez. Toque para tentar de novo.", "erro");
        btn.disabled = false;
      }
    } catch (e) {
      anel.className = "anel";
      setStatus("Sem conexão agora. Toque para tentar de novo.", "erro");
      btn.disabled = false;
    }
  }

  btn.onclick = () => { if (etapa === "inicio") abrirCamera(); else if (etapa === "pronto") capturar(); };
</script>
</body>
</html>
