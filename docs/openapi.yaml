        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string }
      responses:
        "200": { description: OK }
        "400": { description: "message obrigatório" }
        "404": { description: Não encontrada }
        "409": { description: "Conversa não está em atendimento" }

